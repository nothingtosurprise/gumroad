name: Test Subset

on:
  workflow_dispatch:
    inputs:
      test_files:
        description: 'Comma-separated list of test files to run'
        required: true
        type: string
      pr_number:
        description: 'PR number for tracking'
        required: true
        type: string
      run_name:
        description: 'Run name for webhook matching'
        required: false
        type: string
        default: ''
      commit_sha:
        description: 'PR head commit SHA to test against (uses github.sha if empty)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

env:
  TEST_SHA: ${{ inputs.commit_sha || github.sha }}

jobs:
  build:
    name: Build images
    runs-on: ubicloud-standard-4
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Login to Docker Hub
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 120
          max_attempts: 3
          retry_wait_seconds: 10
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Pull or build test image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 1
          command: |
            if docker pull "gumroadteam/web:test-${{ env.TEST_SHA }}" 2>/dev/null; then
              echo "Pulled existing image"
            else
              echo "Image not found, building locally..."
              docker build -f docker/Dockerfile -t "gumroadteam/web:test-${{ env.TEST_SHA }}" --target test .
            fi

  test:
    name: ${{ inputs.run_name || format('tc-pr-{0}', inputs.pr_number) }}
    runs-on: ubicloud-standard-4
    needs: build
    env:
      COMPOSE_PROJECT_NAME: web_${{ github.run_id }}_${{ github.run_attempt }}_subset
      WEB_REPO: gumroadteam/web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TEST_SHA }}

      - name: Login to Docker Hub
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 120
          max_attempts: 3
          retry_wait_seconds: 10
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Start services and pull test image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            docker pull --quiet $WEB_REPO:test-${{ env.TEST_SHA }} &
            PULL_PID=$!
            docker compose -f docker/docker-compose-test-and-ci.yml up -d
            COMPOSE_EXIT=$?
            wait $PULL_PID
            PULL_EXIT=$?
            exit $((COMPOSE_EXIT + PULL_EXIT))
        env:
          COMPOSE_HTTP_TIMEOUT: "300"

      - name: Wait for services
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            IMG=$WEB_REPO:test-${{ env.TEST_SHA }}
            NET=${{ env.COMPOSE_PROJECT_NAME }}_default
            docker run --rm --entrypoint="" --network $NET $IMG docker/ci/wait_on_connection.sh db_test 3306 &
            docker run --rm --entrypoint="" --network $NET $IMG docker/ci/wait_on_connection.sh elasticsearch 9200 &
            docker run --rm --entrypoint="" --network $NET $IMG docker/ci/wait_on_connection.sh minio 9000 &
            wait

      - name: Setup test database
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            docker run --rm --entrypoint="" --network ${{ env.COMPOSE_PROJECT_NAME }}_default \
              -e RAILS_ENV=test \
              $WEB_REPO:test-${{ env.TEST_SHA }} \
              bundle exec rake db:prepare

      - name: Run test subset
        run: |
          TEST_FILES="${{ inputs.test_files }}"
          # Convert comma-separated to space-separated
          TEST_FILES_SPACED=$(echo "$TEST_FILES" | tr ',' ' ')

          docker run --rm --entrypoint="" --network ${{ env.COMPOSE_PROJECT_NAME }}_default \
            -e RUBY_YJIT_ENABLE=1 \
            -e CI=true \
            -e IN_DOCKER=true \
            $WEB_REPO:test-${{ env.TEST_SHA }} \
            /usr/local/bin/gosu app bundle exec rspec \
              --format progress \
              --tag ~skip \
              $TEST_FILES_SPACED
        timeout-minutes: 15

      - name: Clean up
        if: always()
        run: |
          docker compose -f docker/docker-compose-test-and-ci.yml down -v 2>/dev/null || true
          docker rm -f $(docker ps -aq -f name=${{ env.COMPOSE_PROJECT_NAME }}) 2>/dev/null || true
          docker volume rm $(docker volume ls -q -f name=${{ env.COMPOSE_PROJECT_NAME }}) 2>/dev/null || true
